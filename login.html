<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Oftalmo 15</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="theme-color" content="#111827" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body class="login-page">
    <div class="login-wrapper">
      <div class="login-brand">
        <div class="login-logo">
          <i class="fas fa-eye"></i>
        </div>
        <h1 class="login-title">Oftalmo 15</h1>
        <p class="login-subtitle">Sistema de Gestão de Pacientes</p>
      </div>
      <div class="login-card">
        <h2>Bem-vindo de volta</h2>
        <p class="login-desc">
          Entre com suas credenciais para acessar o painel.
        </p>
        <form id="loginForm">
          <div class="input-group">
            <label for="email"><i class="fas fa-envelope"></i> E-mail</label>
            <input
              type="email"
              id="email"
              placeholder="seu@email.com"
              required
              autocomplete="email"
            />
          </div>
          <div class="input-group">
            <label for="password"><i class="fas fa-lock"></i> Senha</label>
            <input
              type="password"
              id="password"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            />
          </div>
          <button type="submit" class="login-btn">
            <i class="fas fa-arrow-right-to-bracket"></i> Entrar
          </button>
        </form>
        <p id="errorMessage" class="login-error"></p>
      </div>
    </div>
    <script type="module" src="auth.js"></script>
    <script type="module">
      import { login, onAuthStateChange } from "./auth.js";

      const loginForm = document.getElementById("loginForm");
      const errorMessage = document.getElementById("errorMessage");

      // Helper para compatibilizar produção (cleanUrls) e ambiente local (.html)
      function supportsCleanUrls() {
        return !/\.html$/.test(window.location.pathname);
      }
      function pathForIndex() {
        return supportsCleanUrls() ? "/" : "index.html";
      }

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        try {
          await login(email, password);
          // Redirecionar sem adicionar ao histórico
          window.location.replace(pathForIndex());
        } catch (error) {
          errorMessage.textContent = "Erro no login: " + error.message;
        }
      });

      onAuthStateChange((user) => {
        if (user) {
          window.location.replace(pathForIndex());
        }
      });
    </script>
  </body>
</html>
